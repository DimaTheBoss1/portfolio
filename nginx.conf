server {
    listen 80;
    server_name portfolio.gabrielingenieur.com;

    root /usr/share/nginx/html/portfolio;
    index index2.html index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Handle filenames with spaces (PDFs, images)
    location / {
        try_files $uri $uri/ /index2.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to instruction files
    location ~* instructions.*\.txt$ {
        deny all;
    }
}
